##################################################
################## VARIABLES #####################
##################################################

$mainMod = SUPER
$terminal = ptyxis
$fileManager = nautilus
$menu = ags toggle rightmenu

##################################################
################# APLICACIONES ###################
##################################################

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = SHIFT, SPACE, exec, $menu
bind = $mainMod, Q, killactive
bind = ALT, F4, killactive

# Alternar ventana flotante
bind = $mainMod, V, togglefloating
# Minimizar ventana actual (mover a workspace especial "minimized" sin cambiar el foco general)
bind = $mainMod, M, movetoworkspacesilent, special:minimized
# Restaurar (mostrar/ocultar) las ventanas minimizadas
bind = $mainMod SHIFT, M, togglespecialworkspace, minimized

bind = $mainMod SHIFT, E, exit

##################################################
################# SNAP WINDOWS ###################
##################################################

# Mitad izquierda (Snap Left)
bind = $mainMod, left, movewindow, l
bind = $mainMod, left, resizeactive, exact 50% 100%
bind = $mainMod, left, moveactive, exact 0 0

# Mitad derecha (Snap Right)
bind = $mainMod, right, movewindow, r
bind = $mainMod, right, resizeactive, exact 50% 100%
bind = $mainMod, right, moveactive, exact 50% 0

# Maximizar (Snap Up)
bind = $mainMod, up, fullscreen, 1

# Restaurar / Centrar (Snap Down)
bind = $mainMod, down, fullscreen, 0
bind = $mainMod, down, resizeactive, exact 900 600
bind = $mainMod, down, centerwindow

##################################################
################# SYSTEM KEYS ####################
##################################################

# Mostrar Escritorio (Win + D) - Usando un workspace especial como "escritorio"
bind = $mainMod, D, togglespecialworkspace, desktop

# Bloquear Pantalla (Win + L)
bind = $mainMod, L, exec, hyprlock || swaylock || lumina-screenlocker

##################################################
################# ALT + TAB ######################
##################################################

bind = ALT, TAB, cyclenext
bind = ALT SHIFT, TAB, cyclenext, prev
bind = $mainMod, TAB, workspace, e+1
bind = $mainMod SHIFT, TAB, workspace, e-1

##################################################
################ SCREENSHOT ######################
##################################################

bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy
bind = , Print, exec, grim ~/Imágenes/screenshot_$(date +%s).png

##################################################
################ WORKSPACES ######################
##################################################

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

##################################################
################ MOUSE ###########################
##################################################

bind = $mainMod, mouse:272, togglefloating,
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

##################################################
################ MULTIMEDIA ######################
##################################################

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

bindel = ,XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 5%-
