animations {
    enabled = yes

    # Curvas suaves
    bezier = smooth, 0.25, 1, 0.5, 1
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = bounce, 0.3, 1.4, 0.4, 1

    # Ventanas
    animation = windows, 1, 6, overshot, slide
    animation = windowsOut, 1, 5, smooth, popin 80%
    animation = windowsMove, 1, 5, smooth
    animation = border, 1, 10, default
    animation = fade, 1, 6, smooth

    # Workspaces (lo que quieres mejorar)
    animation = workspaces, 1, 7, overshot, slide
}